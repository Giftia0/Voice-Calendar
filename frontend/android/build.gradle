// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    maven { url 'https://maven.aliyun.com/repository/google' }
    maven { url 'https://maven.aliyun.com/repository/central' }
    maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    maven { url 'https://maven.aliyun.com/repository/google' }
    maven { url 'https://maven.aliyun.com/repository/central' }
    maven { url 'https://maven.aliyun.com/repository/public' }
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// Local debug fallback for the Android SDK installed on this machine.
// Remove these overrides after installing Android SDK Platform 36 and Build Tools 36.0.0.
ext.buildToolsVersion = "35.0.0"
ext.compileSdkVersion = 35
ext.targetSdkVersion = 35

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
